<!DOCTYPE html>
<html lang="es-CL">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Voxa — Tu especialista en contenido</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  html, body{ margin:0; padding:0; background:#FFFFFF; }
  body{ padding-top:env(safe-area-inset-top); padding-bottom:env(safe-area-inset-bottom); }
  :root{
    --ink:#14141A; --ink-soft:#5B5B66; --line:#E7E7EC; --line-soft:#F1F1F4;
    --accent:#2F3EFF; --accent-soft:#EEF0FF;
    --tag-autoridad-bg:#FFF4E0; --tag-autoridad-tx:#8A5B00;
    --tag-educacion-bg:#E7F5EC; --tag-educacion-tx:#1F7A44;
    --tag-comunidad-bg:#E9F0FB; --tag-comunidad-tx:#28569E;
    --tag-conexion-bg:#FCEBEA; --tag-conexion-tx:#B23A2E;
  }
  * { box-sizing:border-box; }
  #voxa-root{ font-family:'Inter',sans-serif; background:#FFFFFF; color:var(--ink); padding:2.5rem 1.5rem 3rem; max-width:600px; margin:0 auto; }

  .voxa-brand{ display:flex; align-items:center; justify-content:center; gap:8px; margin-bottom:2.5rem; }
  .voxa-brand-mark{ width:9px; height:9px; border-radius:50%; background:var(--accent); }
  .voxa-brand-name{ font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:15px; letter-spacing:0.14em; text-transform:uppercase; }

  .voxa-stage{ display:flex; flex-direction:column; align-items:center; text-align:center; margin-bottom:2.5rem; }
  .voxa-mic-btn{ width:104px; height:104px; border-radius:50%; background:var(--ink); border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; margin-bottom:1.1rem; transition:transform 0.15s ease, background 0.2s ease; }
  .voxa-mic-btn:active{ transform:scale(0.96); }
  .voxa-mic-btn.listening{ background:var(--accent); animation:voxa-pulse 1.6s ease-out infinite; }
  .voxa-mic-btn svg{ width:34px; height:34px; }
  @keyframes voxa-pulse{
    0%{ box-shadow:0 0 0 0 rgba(47,62,255,0.35); }
    70%{ box-shadow:0 0 0 22px rgba(47,62,255,0); }
    100%{ box-shadow:0 0 0 0 rgba(47,62,255,0); }
  }
  .voxa-stage-label{ font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:13px; letter-spacing:0.08em; text-transform:uppercase; color:var(--ink-soft); }
  .voxa-transcript{ font-size:15px; line-height:1.6; color:var(--ink); margin-top:1rem; min-height:24px; max-width:440px; }
  .voxa-transcript:empty{ display:none; }

  .voxa-fallback{ display:none; margin-top:1rem; width:100%; }
  .voxa-fallback.show{ display:block; }
  #voxa-textarea{ width:100%; min-height:90px; background:#FAFAFB; border:1px solid var(--line); border-radius:12px; padding:12px 14px; color:var(--ink); font-family:'Inter'; font-size:14.5px; line-height:1.55; resize:vertical; outline:none; }
  #voxa-textarea:focus{ border-color:var(--accent); }
  .voxa-fallback-tip{ font-size:12px; color:var(--ink-soft); margin:7px 2px 0; text-align:left; }

  .voxa-generate-btn{ margin-top:1.25rem; background:var(--ink); border:none; color:#FFFFFF; font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:13.5px; letter-spacing:0.04em; text-transform:uppercase; padding:13px 30px; border-radius:99px; cursor:pointer; display:none; }
  .voxa-generate-btn.show{ display:inline-block; }
  .voxa-generate-btn:disabled{ opacity:0.4; cursor:default; }

  .voxa-status{ font-size:12.5px; color:var(--ink-soft); margin-top:12px; min-height:16px; }
  .voxa-status.error{ color:#B23A2E; }

  .voxa-result{ display:none; border-top:1px solid var(--line); padding-top:1.75rem; margin-top:0.5rem; }
  .voxa-result.show{ display:block; }
  .voxa-pillar-tag{ display:inline-block; font-family:'Space Grotesk',sans-serif; font-size:11px; font-weight:600; letter-spacing:0.06em; text-transform:uppercase; padding:5px 12px; border-radius:99px; margin-bottom:1.5rem; }

  .voxa-section{ margin-bottom:1.75rem; }
  .voxa-section-title{ font-family:'Space Grotesk',sans-serif; font-size:12px; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; color:var(--ink-soft); margin:0 0 12px; }

  .voxa-hook{ padding:13px 0; border-bottom:1px solid var(--line-soft); }
  .voxa-hook:last-child{ border-bottom:none; }
  .voxa-hook-type{ display:block; font-family:'Space Grotesk',sans-serif; font-size:10.5px; font-weight:600; letter-spacing:0.06em; text-transform:uppercase; color:var(--accent); margin-bottom:5px; }
  .voxa-hook-text{ font-size:15px; line-height:1.5; }

  .voxa-step{ margin-bottom:14px; }
  .voxa-step:last-child{ margin-bottom:0; }
  .voxa-step-label{ font-family:'Space Grotesk',sans-serif; font-size:11px; font-weight:600; letter-spacing:0.05em; text-transform:uppercase; color:var(--ink); margin:0 0 4px; }
  .voxa-step-text{ font-size:14px; line-height:1.6; color:var(--ink-soft); margin:0; }

  .voxa-caption-box{ background:#FAFAFB; border:1px solid var(--line); border-radius:12px; padding:14px 16px; font-size:14px; line-height:1.6; font-style:italic; }

  .voxa-alt-card{ border:1px solid var(--line); border-radius:16px; padding:1.25rem 1.35rem; margin-bottom:16px; }
  .voxa-alt-header{ display:flex; align-items:center; gap:9px; margin-bottom:12px; }
  .voxa-alt-number{ width:22px; height:22px; border-radius:50%; background:var(--ink); color:#FFFFFF; font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:11.5px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .voxa-alt-enfoque{ font-family:'Space Grotesk',sans-serif; font-size:11px; font-weight:600; letter-spacing:0.06em; text-transform:uppercase; color:var(--accent); }
  .voxa-alt-hook{ font-size:16px; line-height:1.5; font-weight:500; margin:0 0 1.1rem; }

  .voxa-again-btn{ background:transparent; border:1px solid var(--line); color:var(--ink); font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:12.5px; letter-spacing:0.04em; text-transform:uppercase; padding:11px 24px; border-radius:99px; cursor:pointer; width:100%; margin-top:0.5rem; }

  .voxa-onboarding{ display:none; }
  .voxa-onboarding.show{ display:block; }
  .voxa-onb-progress{ height:4px; background:var(--line-soft); border-radius:99px; overflow:hidden; margin-bottom:14px; }
  .voxa-onb-progress-fill{ height:100%; background:var(--accent); border-radius:99px; transition:width 0.3s ease; width:14%; }
  .voxa-onb-step{ font-family:'Space Grotesk',sans-serif; font-size:11px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; color:var(--ink-soft); margin:0 0 18px; text-align:center; }
  .voxa-onb-question{ font-family:'Space Grotesk',sans-serif; font-size:19px; font-weight:600; line-height:1.35; text-align:center; margin:0 0 22px; }

  .voxa-onb-mic-btn{ width:60px; height:60px; border-radius:50%; background:var(--ink); border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; margin:0 auto 10px; transition:transform 0.15s ease, background 0.2s ease; }
  .voxa-onb-mic-btn:active{ transform:scale(0.96); }
  .voxa-onb-mic-btn.listening{ background:var(--accent); animation:voxa-pulse 1.6s ease-out infinite; }
  .voxa-onb-mic-btn svg{ width:22px; height:22px; }
  .voxa-onb-mic-label{ font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:11.5px; letter-spacing:0.06em; text-transform:uppercase; color:var(--ink-soft); text-align:center; margin:0 0 16px; }
  .voxa-onb-textarea{ width:100%; min-height:90px; background:#FAFAFB; border:1px solid var(--line); border-radius:12px; padding:12px 14px; color:var(--ink); font-family:'Inter'; font-size:14.5px; line-height:1.55; resize:vertical; outline:none; }
  .voxa-onb-textarea:focus{ border-color:var(--accent); }
  .voxa-onb-tip{ font-size:11.5px; color:var(--ink-soft); margin:8px 2px 0; }
  .voxa-onb-actions{ display:flex; gap:10px; margin-top:1.25rem; }
  .voxa-onb-back{ background:transparent; border:1px solid var(--line); color:var(--ink); font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:13px; letter-spacing:0.02em; padding:13px 20px; border-radius:99px; cursor:pointer; }
  .voxa-onb-back:disabled{ opacity:0.3; cursor:default; }
  .voxa-onb-next{ flex:1; background:var(--ink); border:none; color:#FFFFFF; font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:13px; letter-spacing:0.02em; padding:13px 20px; border-radius:99px; cursor:pointer; }
  .voxa-onb-next:disabled{ opacity:0.4; cursor:default; }

  .voxa-main{ display:none; }
  .voxa-main.show{ display:block; }
  .voxa-edit-profile{ display:block; margin:0 auto 1.5rem; background:transparent; border:none; color:var(--ink-soft); font-family:'Inter'; font-size:12px; text-decoration:underline; cursor:pointer; }

  .voxa-welcome{ display:none; text-align:center; padding:2.5rem 0 1rem; }
  .voxa-welcome.show{ display:block; }
  .voxa-welcome-title{ font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:26px; line-height:1.25; margin:0 0 12px; }
  .voxa-welcome-sub{ font-size:14.5px; color:var(--ink-soft); margin:0 0 2rem; }
</style>
</head>
<body>

<div id="voxa-root">
  <div class="voxa-brand">
    <svg width="26" height="26" viewBox="0 0 64 64" aria-hidden="true">
      <circle cx="32" cy="32" r="31" fill="none" stroke="#EEF0FF" stroke-width="2.6"/>
      <circle cx="32" cy="32" r="22" fill="#2F3EFF"/>
      <path d="M23 25l9 15 9-15" stroke="#FFFFFF" stroke-width="3.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </svg>
    <span class="voxa-brand-name">Voxa</span>
  </div>

  <div class="voxa-welcome" id="voxa-welcome">
    <p class="voxa-welcome-title">Tu idea merece<br>salir de tu cabeza.</p>
    <p class="voxa-welcome-sub">Habla tu idea. Voxa hace el resto.</p>
    <button class="voxa-onb-next" id="voxa-welcome-start" style="width:100%;">Empezar</button>
  </div>

  <div class="voxa-onboarding" id="voxa-onboarding">
    <div class="voxa-onb-progress">
      <div class="voxa-onb-progress-fill" id="voxa-onb-progress-fill"></div>
    </div>
    <p class="voxa-onb-step" id="voxa-onb-step">Pregunta 1 de 7</p>
    <p class="voxa-onb-question" id="voxa-onb-question"></p>

    <button class="voxa-onb-mic-btn" id="voxa-onb-mic-btn" aria-label="Hablar tu respuesta">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M12 15a3 3 0 0 0 3-3V6a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3Z" stroke="#FFFFFF" stroke-width="1.7"/>
        <path d="M7 11v1a5 5 0 0 0 10 0v-1M12 17v3" stroke="#FFFFFF" stroke-width="1.7" stroke-linecap="round"/>
      </svg>
    </button>
    <p class="voxa-onb-mic-label" id="voxa-onb-mic-label">Toca para responder por voz</p>

    <textarea id="voxa-onb-answer" class="voxa-onb-textarea" placeholder=""></textarea>
    <p class="voxa-onb-tip">También puedes escribir directo, o usar el micrófono de tu teclado.</p>
    <div class="voxa-onb-actions">
      <button class="voxa-onb-back" id="voxa-onb-back">Atrás</button>
      <button class="voxa-onb-next" id="voxa-onb-next">Siguiente</button>
    </div>
    <p class="voxa-status" id="voxa-onb-status"></p>
  </div>

  <div class="voxa-main" id="voxa-main">
    <button class="voxa-edit-profile" id="voxa-edit-profile">Editar mi perfil</button>

    <div class="voxa-stage">
      <button class="voxa-mic-btn" id="voxa-mic-btn" aria-label="Hablar">
        <svg viewBox="0 0 24 24" fill="none" id="voxa-mic-icon">
          <path d="M12 15a3 3 0 0 0 3-3V6a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3Z" stroke="#FFFFFF" stroke-width="1.7"/>
          <path d="M7 11v1a5 5 0 0 0 10 0v-1M12 17v3" stroke="#FFFFFF" stroke-width="1.7" stroke-linecap="round"/>
        </svg>
      </button>
      <p class="voxa-stage-label" id="voxa-stage-label">Toca para contarme tu idea</p>
      <p class="voxa-transcript" id="voxa-transcript"></p>

      <div class="voxa-fallback" id="voxa-fallback">
        <textarea id="voxa-textarea" placeholder="Cuéntame qué leíste, qué te pasó, o qué idea tienes..."></textarea>
        <p class="voxa-fallback-tip">Tip: usa el micrófono de tu teclado para dictar aquí mismo.</p>
      </div>

      <button class="voxa-generate-btn" id="voxa-generate-btn">Generar guion</button>
      <p class="voxa-status" id="voxa-status"></p>
    </div>

    <div class="voxa-result" id="voxa-result">
      <span class="voxa-pillar-tag" id="voxa-pillar-tag"></span>
      <div id="voxa-alternatives"></div>
      <button class="voxa-again-btn" id="voxa-again-btn">Contar otra idea</button>
    </div>
  </div>
</div>

<script>
(function(){
  var PILLAR_STYLE = {
    'Autoridad': { bg:'var(--tag-autoridad-bg)', tx:'var(--tag-autoridad-tx)' },
    'Educación': { bg:'var(--tag-educacion-bg)', tx:'var(--tag-educacion-tx)' },
    'Comunidad': { bg:'var(--tag-comunidad-bg)', tx:'var(--tag-comunidad-tx)' },
    'Conexión': { bg:'var(--tag-conexion-bg)', tx:'var(--tag-conexion-tx)' }
  };

  var QUESTIONS = [
    { key:'nicho', q:'¿En qué área creas contenido?', ph:'Ej: nutrición, fitness, psicología, negocios, desarrollo personal...' },
    { key:'diferencia', q:'¿Qué te diferencia de otros en tu área?', ph:'Ej: mi propia experiencia superando algo, mi forma de explicar simple, mi método propio...' },
    { key:'resultado', q:'¿Qué resultado quieres que la gente asocie con tu nombre en 12 meses?', ph:'Ej: "el psicólogo que ayuda a soltar la ansiedad", "la nutricionista que hace fácil comer sano"...' },
    { key:'audiencia', q:'¿Quién es tu audiencia principal?', ph:'Ej: mujeres de 30-45 que quieren bajar de peso sin dietas extremas' },
    { key:'camara', q:'¿Qué tan cómodo te sientes hablando a cámara?', ph:'Ej: me da vergüenza al principio, soy mejor en vivo, me siento natural...' },
    { key:'evitar', q:'¿Hay algo que odies mostrar o hacer en tus contenidos?', ph:'Ej: lujo, humor forzado, bailes, mostrar tu casa...' },
    { key:'tono', q:'¿Qué tono quieres transmitir?', ph:'Ej: mentor cercano, autoridad técnica, movimiento y comunidad...' }
  ];

  var PROFILE_KEY = 'voxa-profile';
  var currentQuestion = 0;
  var answers = {};
  var profile = null;
  var DRAFT_SYSTEM = '';
  var REVIEW_SYSTEM = '';

  var JSON_SHAPE = '{"pilar": "Autoridad" o "Educacion" o "Comunidad" o "Conexion", "alternativas": [{"enfoque": "nombre corto del tipo de hook usado en esta alternativa", "hook": "el hook completo de esta alternativa", "estructura": {"contexto": "que decir en los primeros 3-8 segundos", "desarrollo": "el cuerpo del guion en 2-3 frases", "giro": "la aplicacion o aprendizaje en 1-2 frases", "cierre_cta": "frase de cierre memorable mas una accion concreta"}, "caption": "caption corto listo para copiar y pegar"}, {"enfoque":"...","hook":"...","estructura":{"contexto":"...","desarrollo":"...","giro":"...","cierre_cta":"..."},"caption":"..."}, {"enfoque":"...","hook":"...","estructura":{"contexto":"...","desarrollo":"...","giro":"...","cierre_cta":"..."},"caption":"..."}]}';

  var PROFILE_JSON_SHAPE = '{"nicho": "area de contenido resumida en pocas palabras", "posicionamiento": "frase de posicionamiento personal en 1-2 oraciones", "audiencia": "resumen de la audiencia principal en 1 oracion", "tono": "tono deseado en pocas palabras", "evitar": "lista breve separada por comas de lo que debe evitarse", "notas_camara": "como se siente esta persona frente a camara, resumido en 1 frase"}';

  function buildSystemPrompts(profileContext){
    DRAFT_SYSTEM = 'Eres un especialista en creacion de contenido para redes sociales, estratega personal de marca de ' + profileContext + ' Dado un tema o idea que te comparte, genera un primer borrador con 3 ALTERNATIVAS COMPLETAS distintas entre si (no solo hooks distintos, sino enfoques narrativos distintos para contar la misma idea). Responde EXCLUSIVAMENTE con un objeto JSON valido, sin texto antes ni despues, sin markdown, con esta forma exacta: ' + JSON_SHAPE + ' Cada alternativa debe usar un tipo de hook distinto entre si (elige entre: confesion, contradiccion, in medias res, pregunta directa, dato de shock, promesa audaz, reto directo, lista numerada), priorizando los tipos de hook mas coherentes con el tono de esta persona. Todo en espanol de Chile, tono cercano, sin sonar corporativo ni de venta agresiva.';

    REVIEW_SYSTEM = 'Eres un editor senior de contenido revisando el trabajo de otro especialista para ' + profileContext + ' Te llega la idea original del usuario y un borrador en JSON con 3 alternativas completas. Revisalo con ojo critico: verifica que ninguna alternativa mencione lo que esta persona pidio evitar; verifica que las 3 alternativas sean realmente distintas entre si en enfoque, no variaciones minimas de la misma idea; verifica que cada caption sea corto y natural, no corporativo. Corrige lo que haga falta y devuelve la version final mejorada. Responde EXCLUSIVAMENTE con el objeto JSON final corregido, misma forma exacta: ' + JSON_SHAPE + ' Sin texto antes ni despues, sin markdown.';
  }

  function profileToContext(p){
    return 'una persona que crea contenido en el area de ' + p.nicho + '. Posicionamiento personal: "' + p.posicionamiento + '". Audiencia: ' + p.audiencia + '. Tono deseado: ' + p.tono + '. Cosas a evitar siempre: ' + p.evitar + '. Sobre hablar en camara: ' + p.notas_camara + '.';
  }


  var micBtn = document.getElementById('voxa-mic-btn');
  var stageLabel = document.getElementById('voxa-stage-label');
  var transcriptEl = document.getElementById('voxa-transcript');
  var fallbackEl = document.getElementById('voxa-fallback');
  var textarea = document.getElementById('voxa-textarea');
  var generateBtn = document.getElementById('voxa-generate-btn');
  var statusEl = document.getElementById('voxa-status');
  var resultEl = document.getElementById('voxa-result');
  var againBtn = document.getElementById('voxa-again-btn');

  var recognition = null;
  var isListening = false;
  var SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
  var currentIdea = '';

  function showFallback(message){
    fallbackEl.classList.add('show');
    stageLabel.textContent = message || 'Escribe tu idea aquí abajo';
    generateBtn.classList.add('show');
  }

  if(SpeechRec){
    recognition = new SpeechRec();
    recognition.lang = 'es-CL';
    recognition.continuous = true;
    recognition.interimResults = true;

    recognition.onresult = function(event){
      var transcript = '';
      for(var i=0; i<event.results.length; i++){
        transcript += event.results[i][0].transcript;
      }
      transcriptEl.textContent = transcript;
      currentIdea = transcript;
      if(transcript.trim()){ generateBtn.classList.add('show'); }
    };
    recognition.onerror = function(){
      stopListening();
      transcriptEl.textContent = '';
      showFallback('No pudimos usar el micrófono aquí. Escribe tu idea:');
    };
    recognition.onend = function(){
      if(isListening){ stopListening(); }
    };
  } else {
    micBtn.style.display = 'none';
    showFallback();
  }

  function startListening(){
    if(!recognition) return;
    isListening = true;
    micBtn.classList.add('listening');
    stageLabel.textContent = 'Escuchando... toca de nuevo para terminar';
    statusEl.textContent = '';
    try{ recognition.start(); }
    catch(e){ showFallback('No pudimos usar el micrófono aquí. Escribe tu idea:'); }
  }

  function stopListening(){
    isListening = false;
    micBtn.classList.remove('listening');
    stageLabel.textContent = currentIdea.trim() ? 'Toca para grabar de nuevo' : 'Toca para contarme tu idea';
    if(recognition){ try{ recognition.stop(); }catch(e){} }
  }

  micBtn.addEventListener('click', function(){
    if(isListening){ stopListening(); } else { startListening(); }
  });

  function renderResult(data){
    var pc = PILLAR_STYLE[data.pilar] || PILLAR_STYLE['Conexión'];
    var tag = document.getElementById('voxa-pillar-tag');
    tag.textContent = data.pilar.toUpperCase();
    tag.style.background = pc.bg;
    tag.style.color = pc.tx;

    var wrap = document.getElementById('voxa-alternatives');
    wrap.innerHTML = '';

    data.alternativas.forEach(function(alt, idx){
      var card = document.createElement('div');
      card.className = 'voxa-alt-card';

      var stepsHtml = [
        { label:'Contexto', text:alt.estructura.contexto },
        { label:'Desarrollo', text:alt.estructura.desarrollo },
        { label:'Giro', text:alt.estructura.giro },
        { label:'Cierre y llamado a la acción', text:alt.estructura.cierre_cta }
      ].map(function(s){
        return '<div class="voxa-step"><p class="voxa-step-label">' + s.label + '</p><p class="voxa-step-text">' + s.text + '</p></div>';
      }).join('');

      card.innerHTML =
        '<div class="voxa-alt-header">' +
          '<span class="voxa-alt-number">' + (idx+1) + '</span>' +
          '<span class="voxa-alt-enfoque">' + alt.enfoque + '</span>' +
        '</div>' +
        '<p class="voxa-alt-hook">\u201C' + alt.hook + '\u201D</p>' +
        stepsHtml +
        '<p class="voxa-section-title" style="margin-top:1.1rem;">Caption</p>' +
        '<div class="voxa-caption-box">' + alt.caption + '</div>';

      wrap.appendChild(card);
    });

    resultEl.classList.add('show');
  }

  function extractJson(raw){
    var clean = raw.replace(/```json|```/g, '').trim();
    try{
      return JSON.parse(clean);
    }catch(e){
      var start = clean.indexOf('{');
      var end = clean.lastIndexOf('}');
      if(start !== -1 && end !== -1 && end > start){
        return JSON.parse(clean.substring(start, end + 1));
      }
      throw e;
    }
  }

  async function callVoxa(system, userContent){
    var response = await fetch('/.netlify/functions/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ system: system, message: userContent })
    });
    var data = await response.json();
    if(!response.ok){
      throw new Error('Función respondió ' + response.status + ': ' + (data.error || 'sin detalle'));
    }
    var textBlock = (data.content || []).find(function(b){ return b.type === 'text'; });
    var raw = textBlock ? textBlock.text : '';
    if(!raw){
      throw new Error('Respuesta vacía de Voxa.');
    }
    return extractJson(raw);
  }

  async function generate(){
    var idea = (fallbackEl.classList.contains('show') ? textarea.value : currentIdea).trim();
    if(!idea){
      statusEl.textContent = 'Cuéntame tu idea primero.';
      statusEl.className = 'voxa-status error';
      return;
    }
    generateBtn.disabled = true;
    resultEl.classList.remove('show');
    statusEl.className = 'voxa-status';

    try{
      statusEl.textContent = 'Voxa está pensando tu guion...';
      var draft = await callVoxa(DRAFT_SYSTEM, idea);

      var reviewPayload = 'Idea original: ' + idea + '\n\nBorrador a revisar: ' + JSON.stringify(draft);
      var final = await callVoxa(REVIEW_SYSTEM, reviewPayload);

      renderResult(final);
      statusEl.textContent = '';
    }catch(err){
      console.error(err);
      statusEl.textContent = 'Algo falló generando el guion. Intenta de nuevo.';
      statusEl.className = 'voxa-status error';
    }finally{
      generateBtn.disabled = false;
    }
  }

  generateBtn.addEventListener('click', generate);

  againBtn.addEventListener('click', function(){
    resultEl.classList.remove('show');
    currentIdea = '';
    transcriptEl.textContent = '';
    textarea.value = '';
    generateBtn.classList.remove('show');
    stageLabel.textContent = 'Toca para contarme tu idea';
    window.scrollTo({ top:0, behavior:'smooth' });
  });

  var onboardingEl = document.getElementById('voxa-onboarding');
  var welcomeEl = document.getElementById('voxa-welcome');
  var welcomeStartBtn = document.getElementById('voxa-welcome-start');
  var mainEl = document.getElementById('voxa-main');
  var onbProgressFill = document.getElementById('voxa-onb-progress-fill');
  var onbStepLabel = document.getElementById('voxa-onb-step');
  var onbQuestionLabel = document.getElementById('voxa-onb-question');
  var onbAnswerInput = document.getElementById('voxa-onb-answer');
  var onbBackBtn = document.getElementById('voxa-onb-back');
  var onbNextBtn = document.getElementById('voxa-onb-next');
  var onbStatus = document.getElementById('voxa-onb-status');
  var editProfileBtn = document.getElementById('voxa-edit-profile');
  var onbMicBtn = document.getElementById('voxa-onb-mic-btn');
  var onbMicLabel = document.getElementById('voxa-onb-mic-label');

  var onbRecognition = null;
  var isOnbListening = false;

  if(SpeechRec){
    onbRecognition = new SpeechRec();
    onbRecognition.lang = 'es-CL';
    onbRecognition.continuous = true;
    onbRecognition.interimResults = true;

    onbRecognition.onresult = function(event){
      var transcript = '';
      for(var i=0; i<event.results.length; i++){
        transcript += event.results[i][0].transcript;
      }
      onbAnswerInput.value = transcript;
    };
    onbRecognition.onerror = function(){
      stopOnbListening();
      onbMicLabel.textContent = 'No se pudo usar el micrófono — escribe tu respuesta';
    };
    onbRecognition.onend = function(){
      if(isOnbListening){ stopOnbListening(); }
    };
  } else {
    onbMicBtn.style.display = 'none';
    onbMicLabel.textContent = 'Escribe tu respuesta abajo';
  }

  function startOnbListening(){
    if(!onbRecognition) return;
    isOnbListening = true;
    onbMicBtn.classList.add('listening');
    onbMicLabel.textContent = 'Escuchando... toca de nuevo para terminar';
    try{ onbRecognition.start(); }
    catch(e){ onbMicLabel.textContent = 'No se pudo usar el micrófono — escribe tu respuesta'; }
  }

  function stopOnbListening(){
    isOnbListening = false;
    onbMicBtn.classList.remove('listening');
    onbMicLabel.textContent = 'Toca para responder por voz';
    if(onbRecognition){ try{ onbRecognition.stop(); }catch(e){} }
  }

  onbMicBtn.addEventListener('click', function(){
    if(isOnbListening){ stopOnbListening(); } else { startOnbListening(); }
  });

  function renderQuestion(){
    if(isOnbListening){ stopOnbListening(); }
    var q = QUESTIONS[currentQuestion];
    onbStepLabel.textContent = 'Pregunta ' + (currentQuestion+1) + ' de ' + QUESTIONS.length;
    onbQuestionLabel.textContent = q.q;
    onbAnswerInput.placeholder = q.ph;
    onbAnswerInput.value = answers[q.key] || '';
    onbProgressFill.style.width = Math.round(((currentQuestion+1)/QUESTIONS.length)*100) + '%';
    onbBackBtn.disabled = currentQuestion === 0;
    onbNextBtn.textContent = currentQuestion === QUESTIONS.length - 1 ? 'Crear mi perfil' : 'Siguiente';
    onbStatus.textContent = '';
    if(onbRecognition){ onbMicLabel.textContent = 'Toca para responder por voz'; }
  }

  onbBackBtn.addEventListener('click', function(){
    if(currentQuestion === 0) return;
    answers[QUESTIONS[currentQuestion].key] = onbAnswerInput.value.trim();
    currentQuestion -= 1;
    renderQuestion();
  });

  onbNextBtn.addEventListener('click', async function(){
    var val = onbAnswerInput.value.trim();
    if(!val){
      onbStatus.textContent = 'Responde antes de continuar.';
      onbStatus.className = 'voxa-status error';
      return;
    }
    answers[QUESTIONS[currentQuestion].key] = val;

    if(currentQuestion < QUESTIONS.length - 1){
      currentQuestion += 1;
      renderQuestion();
      return;
    }

    onbNextBtn.disabled = true;
    onbStatus.className = 'voxa-status';
    onbStatus.textContent = 'Creando tu perfil de marca...';

    try{
      var summary = QUESTIONS.map(function(q){ return q.q + ' ' + answers[q.key]; }).join('\n');
      var synthesisSystem = 'Eres un estratega de marca personal experto en multiples nichos de creacion de contenido (salud, fitness, psicologia, negocios, nutricion, desarrollo personal, y otros). Recibiras las respuestas de un cuestionario. Sintetiza esto en un perfil de marca estructurado y accionable. Responde EXCLUSIVAMENTE con un objeto JSON valido, sin texto antes ni despues, sin markdown, con esta forma exacta: ' + PROFILE_JSON_SHAPE;
      var newProfile = await callVoxa(synthesisSystem, summary);
      profile = newProfile;
      localStorage.setItem(PROFILE_KEY, JSON.stringify(profile));
      activateMainScreen();
    }catch(err){
      console.error(err);
      onbStatus.textContent = 'No se pudo crear el perfil: ' + err.message;
      onbStatus.className = 'voxa-status error';
    }finally{
      onbNextBtn.disabled = false;
    }
  });

  function activateMainScreen(){
    buildSystemPrompts(profileToContext(profile));
    onboardingEl.classList.remove('show');
    mainEl.classList.add('show');
  }

  function startOnboarding(){
    currentQuestion = 0;
    answers = {};
    mainEl.classList.remove('show');
    welcomeEl.classList.remove('show');
    onboardingEl.classList.add('show');
    renderQuestion();
  }

  function showWelcome(){
    mainEl.classList.remove('show');
    onboardingEl.classList.remove('show');
    welcomeEl.classList.add('show');
  }

  welcomeStartBtn.addEventListener('click', startOnboarding);

  editProfileBtn.addEventListener('click', function(){
    startOnboarding();
  });

  function init(){
    try{
      var stored = localStorage.getItem(PROFILE_KEY);
      if(stored){
        profile = JSON.parse(stored);
        activateMainScreen();
        return;
      }
    }catch(e){}
    showWelcome();
  }

  init();
})();
</script>

</div>
</body>
</html>
